<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Harmony Recorder</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236366f1' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>🎤</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Harmony Recorder</h1>
            <button id="settingsBtn" class="settings-btn" title="Audio Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
                    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
            </button>
        </header>

        <div class="settings-modal" id="settingsModal">
            <div class="settings-content">
                <div class="settings-header">
                    <h2>Audio Settings</h2>
                    <button class="close-btn" id="closeSettingsBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="settings-body">
                    <div class="setting-group">
                        <label for="inputDevice">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                            </svg>
                            Input (Microphone)
                        </label>
                        <select id="inputDevice">
                            <option value="">Default</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label for="outputDevice">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                            </svg>
                            Output (Speakers/Headphones)
                        </label>
                        <select id="outputDevice">
                            <option value="">Default</option>
                        </select>
                    </div>
                    <p class="settings-hint">Select different devices to use Bluetooth headphones for listening while recording with your phone's microphone.</p>
                    <button id="refreshDevicesBtn" class="refresh-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                        Refresh Devices
                    </button>
                </div>
            </div>
        </div>

        <main>
            <section class="live-recording-section" id="liveRecordingSection">
                <div class="recording-dot"></div>
                <div class="pitch-tuner" id="pitchTuner">
                    <div class="pitch-display">
                        <span class="pitch-note" id="pitchNote">--</span>
                        <span class="pitch-octave" id="pitchOctave"></span>
                    </div>
                    <div class="pitch-meter">
                        <div class="pitch-meter-bar">
                            <div class="pitch-indicator" id="pitchIndicator"></div>
                            <div class="pitch-center-line"></div>
                        </div>
                        <div class="pitch-labels">
                            <span>♭ Flat</span>
                            <span>In Tune</span>
                            <span>Sharp ♯</span>
                        </div>
                    </div>
                    <div class="pitch-frequency" id="pitchFrequency">-- Hz</div>
                </div>
                <div class="live-waveform-container">
                    <canvas class="live-waveform" id="liveWaveform"></canvas>
                    <div class="recording-time" id="liveRecordingTime">0:00</div>
                </div>
            </section>

            <section class="tracks-section">
                <div class="tracks-header">
                    <h2>Tracks</h2>
                    <span class="track-count" id="trackCount">0 tracks</span>
                </div>
                <div class="tracks-container" id="tracksContainer">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 18.5a6.5 6.5 0 006.5-6.5v-4a6.5 6.5 0 00-13 0v4a6.5 6.5 0 006.5 6.5z"/>
                            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                            <path d="M12 18.5V22"/>
                            <path d="M8 22h8"/>
                        </svg>
                        <p>No tracks yet</p>
                        <p class="hint">Click "Record" to create your first track</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <template id="trackTemplate">
        <div class="track" data-track-id="" draggable="true">
            <div class="track-content">
                <div class="track-info">
                    <span class="track-name"></span>
                    <span class="track-duration"></span>
                </div>
                <div class="track-waveform">
                    <canvas class="waveform-canvas"></canvas>
                    <div class="waveform-progress"></div>
                    <div class="playhead"></div>
                </div>
                <div class="track-controls">
                    <button class="track-btn play-track-btn" title="Play">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button class="track-btn mute-track-btn" title="Mute">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5z"/>
                        </svg>
                    </button>
                    <button class="track-btn solo-track-btn" title="Solo">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 1a4 4 0 00-4 4v6a4 4 0 008 0V5a4 4 0 00-4-4z"/>
                            <path d="M18 11a6 6 0 01-12 0H4a8 8 0 0016 0h-2z"/>
                            <path d="M11 19.93V23h2v-3.07a8.001 8.001 0 007-7.93h-2a6 6 0 01-12 0H4a8.001 8.001 0 007 7.93z" opacity="0"/>
                        </svg>
                        <span class="solo-label">S</span>
                    </button>
                    <button class="track-btn delete-track-btn" title="Delete">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                    </button>
                    <input type="range" class="volume-slider" min="0" max="100" value="100" title="Volume">
                </div>
            </div>
        </div>
    </template>

    <nav class="bottom-nav">
        <div class="recording-indicator" id="recordingIndicator">
            <span class="pulse"></span>
            <span>Recording...</span>
            <span class="timer" id="recordTimer">0:00</span>
        </div>
        <div class="nav-controls">
            <button id="recordBtn" class="nav-btn record-btn" title="Record new track">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="8"/>
                </svg>
                <span>Record</span>
            </button>
            <button id="playAllBtn" class="nav-btn play-btn" disabled title="Play all tracks">
                <svg class="icon play-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg class="icon stop-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <rect x="6" y="6" width="12" height="12"/>
                </svg>
                <span class="btn-label">Play All</span>
            </button>
            <button id="muteAllBtn" class="nav-btn mute-all-btn" disabled title="Mute/unmute all tracks">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5z"/>
                </svg>
                <span>Mute All</span>
            </button>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
